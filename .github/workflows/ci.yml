name: CI

on:
    pull_request:
        branches: [master]
    push:
        branches: [master]

env:
    DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/trackgames_test"

jobs:
    ci:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: "22.13.x"
                  cache: "npm"

            - run: npm ci --ignore-scripts

            - name: Generate Prisma client
              run: node_modules/.bin/prisma generate

            - name: Type check
              run: npm run tc

            - name: Lint
              run: npm run lint

            - name: Format check
              run: npm run format:check

            - name: Test
              run: npm run test -- --ci

            - name: Build
              run: npm run build
